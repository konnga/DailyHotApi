name = "dailyhot-api"
main = "src/worker.ts"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
CACHE_TTL = "3600"
REQUEST_TIMEOUT = "6000"
ALLOWED_DOMAIN = "*"
ALLOWED_HOST = ""
DISALLOW_ROBOT = "true"
USE_LOG_FILE = "false"
RSS_MODE = "false"
FILTER_WEIBO_ADVERTISEMENT = "false"

# Run `pnpm exec wrangler kv namespace create CACHE`, then replace this value.
[[kv_namespaces]]
binding = "KV"
id = "5eac08c474874c059536ab6b7a13a376"
